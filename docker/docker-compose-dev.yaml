services:
  db:
    container_name: crypto-app-db
    image: postgres:17
    environment:
      POSTGRES_USER: semih
      POSTGRES_PASSWORD: semihsahin11.
      POSTGRES_DB: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: crypto-app-backend:latest
    container_name: backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: